version: '3.8'

services:
  # 1. Database Container (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: threat_db
    restart: always
    environment:
      POSTGRES_DB: threatintel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      # We seed via FastAPI startup handler automatically, but mounting it is good practice
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d threatintel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threat_net

  # 2. FastAPI Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/threatintel
      - SECRET_KEY=supersecretkey_change_me_in_production_1234567890
      - GEMINI_API_KEY=your_gemini_api_key_here
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - backend_logs:/workspace/logs
      # Mount seed.sql to allow the startup auto-seeding handler to find it
      - ./database/seed.sql:/workspace/database/seed.sql
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - threat_net

  # 3. Streamlit Dashboard Container
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: streamlit_dashboard
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_started
    networks:
      - threat_net

  # 4. n8n Automation Engine Container
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_automation
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=adminpassword
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - threat_net

  # 5. Nginx Reverse Proxy Container
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - threat_net

volumes:
  postgres_data:
  backend_logs:
  n8n_data:

networks:
  threat_net:
    driver: bridge
